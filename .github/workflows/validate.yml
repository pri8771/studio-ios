name: Validate Studio OS

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Run validation suite
        shell: bash
        run: |
          set -o pipefail
          mkdir -p ci-logs
          {
            echo '## Compile Python tools'
            python -m compileall -q scripts tests
            echo '## Test Studio CLI'
            python -m unittest discover -s tests -p 'test_*.py' -v
            echo '## Validate rules and records'
            python scripts/validate_repo.py
            echo '## Check standard drift'
            python scripts/check_standard_drift.py
            echo '## Generate dashboard'
            python scripts/generate_dashboard.py
            echo '## Smoke-test CLI commands'
            python scripts/studio_cli.py --dry-run validate
            python scripts/studio_cli.py --dry-run dashboard
            python scripts/studio_cli.py --dry-run new --name "Document Flow" --no-remote --skip-factory-bootstrap
          } 2>&1 | tee ci-logs/validation.log
      - name: Upload validation diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: studio-validation-${{ github.run_id }}
          path: ci-logs/
      - name: Upload dashboard artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: studio-dashboard
          path: dashboard/
